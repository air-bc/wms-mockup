      <!-- メインコンテンツ -->
      <main class="app-main schedule-main" id="mainContent">

        <h1 class="page-header heading-xl" id="pageTitle">ユーザー登録</h1>

        <section class="section-card" aria-labelledby="sectionUserForm">
          <h2 class="heading-m" id="sectionUserForm">ユーザー情報</h2>
          <hr class="section-divider">

          <form id="userForm" onsubmit="return false;">
            <div class="user-form">

              <div class="user-form-field">
                <label class="user-form-label" for="loginId">ログインID <span aria-hidden="true">*</span></label>
                <input
                  type="text"
                  id="loginId"
                  class="form-input"
                  placeholder="例: user001"
                  autocomplete="off"
                  aria-required="true"
                >
                <span class="user-form-error" id="loginIdError" role="alert">ログインIDを入力してください</span>
              </div>

              <div class="user-form-field">
                <label class="user-form-label" for="userName">氏名 <span aria-hidden="true">*</span></label>
                <input
                  type="text"
                  id="userName"
                  class="form-input"
                  placeholder="例: 山田 太郎"
                  autocomplete="off"
                  aria-required="true"
                >
                <span class="user-form-error" id="userNameError" role="alert">氏名を入力してください</span>
              </div>

              <div class="user-form-field">
                <label class="user-form-label" for="userRole">権限 <span aria-hidden="true">*</span></label>
                <select id="userRole" class="form-input" aria-required="true">
                  <option value="">選択してください</option>
                  <option value="管理者">管理者</option>
                  <option value="オペレーター">オペレーター</option>
                </select>
                <span class="user-form-error" id="userRoleError" role="alert">権限を選択してください</span>
              </div>

              <div class="user-form-actions">
                <button type="button" class="btn btn-default" onclick="handleUserCancel()">キャンセル</button>
                <button type="button" class="btn btn-primary" onclick="handleUserSave()">保存</button>
              </div>

            </div>
          </form>

        </section>

      </main>
