      <!-- メインコンテンツ -->
      <main class="app-main" id="mainContent">

        <h1 class="page-header heading-xl">棚卸管理</h1>

        <!-- 操作バー -->
        <section class="section-card" aria-label="棚卸操作">
          <div class="inventory-control-bar">
            <div class="inventory-control-row inventory-control-row--space-between">
              <button type="button" class="btn btn-primary" id="inventoryStartBtn">棚卸開始</button>
              <button type="button" class="btn btn-primary" id="inventoryCompleteBtn" disabled>棚卸完了</button>
            </div>
            <div class="inventory-control-row">
              <span class="inventory-last-updated">最終更新日時: <span id="inventoryLastUpdated">—</span></span>
              <button type="button" class="btn btn-default" id="inventoryRefreshBtn" disabled>更新</button>
            </div>
            <div class="inventory-control-row">
              <button type="button" class="btn btn-primary" id="inventoryApproveBtn" disabled>承認</button>
            </div>
          </div>
        </section>

        <!-- 案内文（棚卸開始前） -->
        <div id="inventoryGuide" class="info-banner" role="status">
          棚卸を開始するには「棚卸開始」ボタンをクリックしてください。
        </div>

        <!-- 棚ロケ一覧（棚卸開始後） -->
        <section id="inventoryTableArea" class="section-card" style="display: none;" aria-labelledby="sectionInventoryCount">
          <h2 class="heading-m" id="sectionInventoryCount">棚ロケ一覧</h2>
          <hr class="section-divider">
          <div class="table-scroll-x">
            <table class="schedule-table" id="inventoryTable" aria-label="棚ロケ一覧">
              <thead>
                <tr>
                  <th scope="col" style="width: 2.5rem; text-align: center;"></th>
                  <th scope="col">棚ロケ</th>
                  <th scope="col">状態</th>
                  <th scope="col">差異</th>
                </tr>
              </thead>
              <tbody id="inventoryTableBody"></tbody>
            </table>
          </div>
        </section>

      </main>
    </div>
  </div>

  <!-- 棚卸完了確認モーダル -->
  <div id="inventoryCompleteModal" class="ds-modal-overlay" style="display: none;"
       role="dialog" aria-modal="true" aria-labelledby="inventoryCompleteModalTitle">
    <div class="ds-modal">
      <div class="ds-modal-header">
        <h2 class="heading-s" id="inventoryCompleteModalTitle">棚卸完了の確認</h2>
      </div>
      <div class="ds-modal-body">
        棚卸を完了します。在庫数が棚卸入力値で更新されます。よろしいですか？
      </div>
      <div class="ds-modal-footer">
        <button type="button" class="btn btn-default" id="inventoryCompleteCancel" onclick="closeModal('inventoryCompleteModal')">キャンセル</button>
        <button type="button" class="btn btn-primary" id="inventoryCompleteOk">完了</button>
      </div>
    </div>
  </div>

  <!-- フラッシュメッセージ -->
  <div id="inventoryFlash" class="inventory-flash" style="display: none;" role="alert"></div>

  <script src="../static/js/sticky-notes.js"></script>
  <script src="../static/js/main.js"></script>
  <script>
    document.getElementById('inventoryStartBtn').addEventListener('click', startInventory);
    document.getElementById('inventoryRefreshBtn').addEventListener('click', refreshInventory);
    document.getElementById('inventoryApproveBtn').addEventListener('click', approveSelected);
    document.getElementById('inventoryCompleteBtn').addEventListener('click', function() {
      openModal('inventoryCompleteModal');
    });
    document.getElementById('inventoryCompleteOk').addEventListener('click', completeInventory);
  </script>
