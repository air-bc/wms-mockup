      <!-- メインコンテンツ -->
      <main class="app-main" id="mainContent">

        <h1 class="page-header heading-xl">棚ロケ定義</h1>

        <!-- タブバー -->
        <div class="page-tabs" role="tablist">
          <button class="page-tab active" id="tabShelf" onclick="switchShelfTab('shelf')" role="tab" aria-selected="true">棚ロケ定義</button>
          <button class="page-tab" id="tabRoute" onclick="switchShelfTab('route')" role="tab" aria-selected="false">ピッキング経路</button>
        </div>

        <!-- メインカード（2タブパネルを内包） -->
        <div class="section-card">

          <!-- タブ1: 棚ロケ定義 -->
          <div class="tab-panel active" id="panelShelf" role="tabpanel">
            <div class="shelf-add-form">
              <label for="shelfCodeInput">棚ロケコード</label>
              <input type="text" id="shelfCodeInput" class="form-input shelf-input-name" placeholder="例: A-01-01-1">
              <button class="btn btn-primary" onclick="addShelfLocation()">追加</button>
            </div>
            <div class="section-action-row">
              <button class="btn btn-default" type="button" onclick="printShelfQR()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M3 11h2V9H3v2zm0 4h2v-2H3v2zm0-8h2V5H3v2zm4 4h14V9H7v2zm0 4h14v-2H7v2zM7 5v2h14V5H7z"/>
                </svg>
                QR印刷
              </button>
            </div>
            <table class="data-table inventory-table" id="shelfTable">
              <thead>
                <tr>
                  <th style="width:32px"><input type="checkbox" id="shelfCheckAll" onclick="toggleAllShelfChecks(this)"></th>
                  <th>棚ロケコード</th>
                  <th id="shelfPickOrderHeader" style="width:72px">経路順</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="shelfTableBody"></tbody>
            </table>
          </div>

          <!-- タブ2: ピッキング経路 -->
          <div class="tab-panel" id="panelRoute" role="tabpanel">
            <p class="body-s" style="color:var(--ds-text-subtle); margin-bottom:var(--ds-space-200)">行をドラッグして並び替えることでピック順を変更できます。</p>
            <table class="data-table inventory-table" id="pickRouteTable">
              <thead>
                <tr>
                  <th style="width:60px">ピック順</th>
                  <th>棚ロケコード</th>
                  <th style="width:48px"></th>
                </tr>
              </thead>
              <tbody id="pickRouteTableBody"></tbody>
            </table>
          </div>

        </div>
