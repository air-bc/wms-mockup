      <!-- メインコンテンツ -->
      <main class="app-main" id="mainContent">

        <h1 class="page-header heading-xl">在庫調整</h1>

        <div class="warning-banner" role="note">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
          <p>この画面で入力したデータは<strong>確定情報</strong>として在庫へ直接反映されます。内容をよく確認してから登録してください。</p>
        </div>

        <!-- 機能1: 在庫調整フォーム -->
        <section class="section-card" aria-labelledby="sectionAdjustment">
          <h2 class="heading-m" id="sectionAdjustment">在庫調整情報入力</h2>
          <hr class="section-divider">
          <form class="manual-form-grid" id="adjustmentForm" onsubmit="return false;">

            <div class="manual-form-field">
              <label class="manual-form-label" for="adjItemCode">商品コード <span class="manual-form-required" aria-label="必須">*</span></label>
              <select id="adjItemCode" class="form-input" required onchange="onAdjItemCodeChange()">
                <option value="">選択してください</option>
              </select>
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="adjItemName">商品名 <span class="manual-form-required" aria-label="必須">*</span></label>
              <select id="adjItemName" class="form-input" required onchange="onAdjItemNameChange()">
                <option value="">選択してください</option>
              </select>
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="adjUnitType">単位区分 <span class="manual-form-required" aria-label="必須">*</span></label>
              <select id="adjUnitType" class="form-input is-readonly" disabled>
                <option value="">-</option>
              </select>
            </div>

            <div class="manual-form-field">
              <!-- 空白カラム（単位区分は左1カラムのみ） -->
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="adjLotNo">ロット番号</label>
              <input type="text" id="adjLotNo" class="form-input" placeholder="例: LOT-2025-001">
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="adjExpiryDate">賞味期限</label>
              <input type="date" id="adjExpiryDate" class="form-input date-input">
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="adjShelfLocation">棚ロケ <span class="manual-form-required" aria-label="必須">*</span></label>
              <select id="adjShelfLocation" class="form-input" required>
                <option value="">棚ロケを選択</option>
              </select>
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="adjQuantity">数量 <span class="manual-form-required" aria-label="必須">*</span></label>
              <input type="number" id="adjQuantity" class="form-input manual-form-qty" step="1" placeholder="+10 または -5" required>
            </div>

            <div class="manual-form-actions manual-form-field--full">
              <button type="button" class="btn btn-primary" onclick="openAdjustmentModal()">登録する</button>
            </div>

          </form>
        </section>

      </main>
    </div>

  <!-- 機能2: 確認モーダル -->
  <div id="adjustmentModal" class="ds-modal-overlay" style="display: none;"
       role="dialog" aria-modal="true" aria-labelledby="adjustmentModalTitle">
    <div class="ds-modal">
      <div class="ds-modal-header">
        <h2 class="heading-s" id="adjustmentModalTitle">在庫調整の確認</h2>
      </div>
      <div class="ds-modal-body">
        <table class="modal-confirm-table">
          <tbody>
            <tr>
              <th scope="row">商品コード</th>
              <td id="modalItemCode">—</td>
            </tr>
            <tr>
              <th scope="row">商品名</th>
              <td id="modalItemName">—</td>
            </tr>
            <tr>
              <th scope="row">単位区分</th>
              <td id="modalUnitType">—</td>
            </tr>
            <tr>
              <th scope="row">ロット番号</th>
              <td id="modalLotNo">—</td>
            </tr>
            <tr>
              <th scope="row">賞味期限</th>
              <td id="modalExpiryDate">—</td>
            </tr>
            <tr>
              <th scope="row">棚ロケ</th>
              <td id="modalShelfLocation">—</td>
            </tr>
            <tr>
              <th scope="row">数量</th>
              <td id="modalQuantity">—</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="ds-modal-footer">
        <button type="button" class="btn btn-default" onclick="closeModal('adjustmentModal')">キャンセル</button>
        <button type="button" class="btn btn-primary" onclick="confirmAdjustment()">確認して登録</button>
      </div>
    </div>
  </div>

  <script src="../static/js/sticky-notes.js"></script>
