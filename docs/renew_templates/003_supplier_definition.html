      <main class="app-main" id="mainContent">

        <div class="page-header">
          <h1 class="heading-m">取引先定義</h1>
        </div>

        <!-- CSVアップロード -->
        <section class="section-card" aria-labelledby="sectionSupplierUpload">
          <h2 class="heading-s" id="sectionSupplierUpload">CSVアップロード</h2>
          <hr class="section-divider">
          <div class="file-upload-row">
            <label class="file-input-label" for="csvFileInput">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
              </svg>
              <span class="file-label-text" id="csvSelectedName">ファイルを選択してください (.csv)</span>
              <input
                type="file"
                id="csvFileInput"
                accept=".csv"
                class="file-input-hidden"
                onchange="handleFileChange('csvFileInput', 'csvSelectedName')"
                aria-label="取引先CSVファイルを選択"
              >
            </label>
            <button type="button" class="btn btn-primary" id="csvUploadBtn" onclick="uploadSupplierCsv()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
              </svg>
              アップロード
            </button>
          </div>
          <div id="csvErrorMessage" class="upload-error-message" style="display:none;" role="alert"></div>
          <div id="csvSuccessMessage" class="upload-success-banner" style="display:none;" role="status"></div>
        </section>

        <!-- 検索 -->
        <div class="supplier-search-row">
          <input
            type="text"
            id="supplierSearchInput"
            class="form-input schedule-search-input"
            placeholder="会社名・担当者名で検索"
            aria-label="取引先を検索"
            onkeydown="if(event.key==='Enter') searchSuppliers()"
          >
          <button type="button" class="btn btn-default" onclick="searchSuppliers()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            検索
          </button>
        </div>

        <!-- 取引先一覧 -->
        <section class="section-card" aria-labelledby="sectionSupplierList">
          <h2 class="heading-s" id="sectionSupplierList">取引先一覧</h2>
          <hr class="section-divider">
          <div class="table-scroll-x">
            <table class="schedule-table" id="supplierTable">
              <thead>
                <tr>
                  <th scope="col">会社名</th>
                  <th scope="col">会社名（かな）</th>
                  <th scope="col">郵便番号</th>
                  <th scope="col">住所</th>
                  <th scope="col">電話番号</th>
                  <th scope="col">担当者名</th>
                  <th scope="col">変換定義</th>
                </tr>
              </thead>
              <tbody id="supplierTableBody">
                <!-- JS により描画 -->
              </tbody>
            </table>
          </div>
        </section>

        <!-- ページネーション -->
        <div class="history-pagination" id="paginationRow" role="navigation" aria-label="ページネーション"></div>

      </main>

    </div>
  </div>

  <!-- 変換定義モーダル -->
  <div id="conversionModalOverlay" class="ds-modal-overlay" style="display:none;"
       role="dialog" aria-modal="true" aria-labelledby="conversionModalTitle"
       onclick="if(event.target===this) closeConversionModal()">
    <div class="ds-modal">
      <div class="ds-modal-header">
        <h2 class="heading-s" id="conversionModalTitle">変換定義</h2>
        <button type="button" class="btn btn-icon-subtle" onclick="closeConversionModal()" aria-label="閉じる">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      <div class="ds-modal-body">
        <div class="file-upload-row">
          <label class="file-input-label" for="convCsvFileInput">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
            </svg>
            <span class="file-label-text" id="convCsvSelectedName">ファイルを選択してください (.csv)</span>
            <input
              type="file"
              id="convCsvFileInput"
              accept=".csv"
              class="file-input-hidden"
              onchange="handleFileChange('convCsvFileInput', 'convCsvSelectedName')"
              aria-label="変換定義CSVファイルを選択"
            >
          </label>
          <button type="button" class="btn btn-primary" onclick="uploadConversionCsv()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
            </svg>
            アップロード
          </button>
        </div>
        <div id="convCsvErrorMessage" class="upload-error-message" style="display:none;" role="alert"></div>
      </div>
      <div class="ds-modal-footer">
        <button type="button" class="btn btn-default" onclick="closeConversionModal()">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="../static/js/main.js"></script>
  <script src="../static/js/sticky-notes.js"></script>
