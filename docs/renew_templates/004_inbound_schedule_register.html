      <!-- メインコンテンツ -->
      <main class="app-main" id="mainContent">

        <h1 class="page-header heading-xl">入荷予定登録</h1>

        <div class="info-banner" role="note">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
          <p>この画面で入力したデータは<strong>入荷予定</strong>として登録されます。在庫への反映は<a href="005_inbound_schedule_confirm.html">入荷予定確定</a>での確定後に行われます。</p>
        </div>

        <!-- 機能1: 入荷事前情報CSVアップロード -->
        <section class="section-card" aria-labelledby="sectionInboundUpload">
          <h2 class="heading-m" id="sectionInboundUpload">入荷事前情報アップロード</h2>
          <hr class="section-divider">
          <div class="file-upload-row">
            <label class="file-input-label" for="inputInboundUpload">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
              </svg>
              <span class="file-label-text" id="inboundUploadFilename">ファイルを選択してください (.csv)</span>
              <input
                type="file"
                id="inputInboundUpload"
                accept=".csv"
                class="file-input-hidden"
                onchange="handleFileChange('inputInboundUpload', 'inboundUploadFilename')"
                aria-label="入荷事前情報CSVファイルを選択"
              >
            </label>
            <button type="button" class="btn btn-primary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
              </svg>
              アップロード
            </button>
          </div>
        </section>

        <!-- 機能2: 手動入力フォーム -->
        <section class="section-card" aria-labelledby="sectionManualInput">
          <h2 class="heading-m" id="sectionManualInput">手動入力</h2>
          <hr class="section-divider">
          <form class="manual-form-grid" id="manualInputForm" onsubmit="return false;">

            <div class="manual-form-field">
              <label class="manual-form-label" for="inboundScheduleDate">入荷予定日 <span class="manual-form-required" aria-label="必須">*</span></label>
              <input type="date" id="inboundScheduleDate" class="form-input" required>
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="inboundScheduleTime">入荷予定時刻</label>
              <input type="time" id="inboundScheduleTime" class="form-input">
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="slipNo">伝票No <span class="manual-form-required" aria-label="必須">*</span></label>
              <input type="text" id="slipNo" class="form-input" placeholder="例: T-1001" required>
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="supplier">入荷元</label>
              <input type="text" id="supplier" class="form-input" placeholder="例: 佐々木商事">
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="itemCode">商品コード <span class="manual-form-required" aria-label="必須">*</span></label>
              <input type="text" id="itemCode" class="form-input" placeholder="例: P-001" required>
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="itemName">商品名 <span class="manual-form-required" aria-label="必須">*</span></label>
              <input type="text" id="itemName" class="form-input" placeholder="例: 商品A" required>
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="quantity">数量 <span class="manual-form-required" aria-label="必須">*</span></label>
              <input type="number" id="quantity" class="form-input manual-form-qty" min="1" placeholder="1" required>
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="unitType">単位区分</label>
              <select id="unitType" class="form-input">
                <option value="">-</option>
                <option value="pallet">パレット</option>
                <option value="case">ケース</option>
                <option value="ball">ボール</option>
                <option value="piece">ピース</option>
              </select>
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="lotNo">ロット番号</label>
              <input type="text" id="lotNo" class="form-input" placeholder="例: LOT-2025-001">
            </div>

            <div class="manual-form-field">
              <label class="manual-form-label" for="expiryDate">賞味期限</label>
              <input type="date" id="expiryDate" class="form-input">
            </div>

            <div class="manual-form-field manual-form-field--full">
              <label class="manual-form-label" for="note">特記事項</label>
              <input type="text" id="note" class="form-input" placeholder="特記事項があれば入力してください">
            </div>

            <div class="manual-form-actions manual-form-field--full">
              <button type="button" class="btn btn-default" onclick="submitAndContinue()">登録して続ける</button>
              <button type="button" class="btn btn-primary" onclick="submitAndNavigate()">登録する</button>
            </div>

          </form>
        </section>

      </main>
    </div>
